<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M5 Assignment</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <style>
        h1              {margin-bottom: 30px;}
        label           {font-weight: bold;}
        input, select   {margin-bottom: 10px;}
        form            {width: 30%; padding: 20px;}
    </style>
</head>
<body class="m-4">
    <h1>Employee Management System</h1>
    <form id="empForm">
     
    <h2 class="text-center mb-4">Add Employee</h2>

    <div class="mb-3">
        <label for="id" class="form-label"><strong>8-Digit Employee ID</strong></label>
        <input type="text" id="id" class="form-control" maxlength="8" required>
    </div>


    <div class="mb-3">
        <label for="name" class="form-label"><strong>Full Name</strong></label>
        <input type="text" id="name" class="form-control" required>
    </div>
    
    <div class="mb-3">
        <label for="ext" class="form-label"><strong>4-Digit Extension</strong></label>
        <input type="text" id="ext" class="form-control" maxlength="4" required>
    </div>

    
    <div class="mb-3">
        <label for="email" class="form-label"><strong>Email</strong></label>
        <input type="email" id="email" class="form-control" required>
    </div>


    <div class="mb-3">
        <label for="department" class="form-label">Department</label>
        <select class="form-select" id="department" required>
            <option value="">Select Department</option>
            <option>Administrative</option>
            <option>Engineering</option>
            <option>Executive</option>
            <option>Marketing</option>
            <option>Quality Assurance</option>
            <option>Sales</option>
        </select>
    </div>

    <button type="submit" id="submit" class="btn btn-primary w-100">
        Add Employee
    </button>
</form>

<script src="js/script.js"></script>


</body>
</html>
